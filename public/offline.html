<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strum — sem conexão</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0ede4;
        color: #004741;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      h1 { font-size: 22px; margin: 16px 0 8px; }
      p { color: rgba(0, 71, 65, 0.65); line-height: 1.5; font-size: 14px; }
      .dot {
        width: 56px; height: 56px; border-radius: 16px; margin: 0 auto;
        background: #004741; color: #f0ede4; display: flex;
        align-items: center; justify-content: center; font-size: 28px; font-weight: 700;
      }
      button {
        margin-top: 20px; border: 0; border-radius: 9999px; cursor: pointer;
        background: #004741; color: #f0ede4; padding: 12px 28px;
        font-size: 14px; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot">S</div>
      <h1>Você está sem conexão</h1>
      <p>
        O Strum precisa de internet para carregar suas lições e salvar seu
        progresso. Verifique sua conexão e tente novamente.
      </p>
      <button onclick="location.reload()">Tentar de novo</button>
    </div>
  </body>
</html>
